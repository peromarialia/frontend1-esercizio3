<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Avengers Wiki</title>
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts: Share Tech, Orbitron e BANGERS per lo stile fumetto di Spider-Man -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Orbitron:wght@500;700;900&family=Share+Tech&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Share Tech"', 'sans-serif'],
            orbitron: ['"Orbitron"', 'sans-serif'],
            bangers: ['"Bangers"', 'cursive'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-[#0b0f19] text-gray-300 font-sans min-h-screen flex flex-col items-center py-10 px-4 select-none antialiased">
