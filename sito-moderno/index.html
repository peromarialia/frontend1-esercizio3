<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Avengers Wiki</title>
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts: Share Tech, Orbitron e BANGERS per lo stile fumetto di Spider-Man -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Orbitron:wght@500;700;900&family=Share+Tech&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Share Tech"', 'sans-serif'],
            orbitron: ['"Orbitron"', 'sans-serif'],
            bangers: ['"Bangers"', 'cursive'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-[#0b0f19] text-gray-300 font-sans min-h-screen flex flex-col items-center py-10 px-4 select-none antialiased">

  <!-- MAIN CONTAINER -->
  <div class="w-full max-w-4xl flex flex-col gap-6">
    
    <!-- HEADER SECTION -->
    <div class="flex flex-col gap-4 w-full">
      <header class="bg-[#131b2e] rounded-xl p-4 border border-[#1e2942] shadow-xl flex flex-col sm:flex-row items-center justify-between gap-4">
        <h1 class="font-orbitron font-bold text-xl text-white tracking-widest uppercase pl-2">
          The Avengers Wiki
        </h1>

        <!-- Search Bar -->
        <div class="relative w-10 h-10 flex items-center justify-center bg-[#1c253e] rounded-full border-2 border-[#243253] group transition-all duration-500 ease-in-out focus-within:w-full sm:focus-within:w-96 focus-within:border-[#c084fc] focus-within:shadow-[0_0_15px_rgba(192,132,252,0.4)] focus-within:bg-[#232e4c]">
          <input type="text" class="absolute inset-0 w-full h-full bg-transparent text-sm text-gray-300 pl-4 pr-10 py-2 rounded-full outline-none opacity-0 focus:opacity-100 cursor-pointer focus:cursor-text transition-opacity duration-300 z-20" placeholder="Cerca...">
          <div class="text-gray-400 transition-all duration-500 ease-in-out z-10 flex items-center justify-center transform group-focus-within:absolute group-focus-within:right-3.5 group-focus-within:text-[#c084fc]">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
          </div>
        </div>
      </header>

      <!-- Navigation Menu -->
      <nav class="flex justify-center gap-12 w-full px-6">
        <a href="#" class="bg-[#1c253e] hover:bg-[#28355a] text-white text-xs font-semibold py-1.5 px-10 rounded-full text-center transition-all duration-200 uppercase tracking-widest border border-[#243253]">Home</a>
        <a href="#" class="bg-[#1c253e] hover:bg-[#28355a] text-white text-xs font-semibold py-1.5 px-10 rounded-full text-center transition-all duration-200 uppercase tracking-widest border border-[#243253]">About</a>
        <a href="#" class="bg-[#1c253e] hover:bg-[#28355a] text-white text-xs font-semibold py-1.5 px-10 rounded-full text-center transition-all duration-200 uppercase tracking-widest border border-[#243253]">Contact</a>
      </nav>
    </div>

    <!-- SECTION 1: THE AVENGERS MOVIES -->
    <section class="bg-[#131b2e] rounded-xl p-6 border border-[#1e2942] shadow-xl flex flex-col items-center w-full">
      <h2 class="font-orbitron font-black text-2xl text-white mb-6 tracking-widest uppercase">The Avengers Movies</h2>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-6 w-full px-2 justify-between">
        <div class="overflow-hidden rounded-lg border border-[#243253] bg-[#0b0f19]/40 shadow-md aspect-[2/3] w-full transform transition-all duration-300 ease-out hover:-translate-y-2 hover:rotate-1 hover:border-[#c084fc] hover:shadow-[0_10px_20px_rgba(192,132,252,0.25)] cursor-pointer group">
          <img src="https://image.tmdb.org/t/p/w500/v7Ta7x4E5ps86C3j5B6UolfeAV7.jpg" alt="The Avengers" class="w-full h-full object-cover transition-all duration-300 group-hover:scale-105 group-hover:brightness-110">
        </div>
        <div class="overflow-hidden rounded-lg border border-[#243253] bg-[#0b0f19]/40 shadow-md aspect-[2/3] w-full transform transition-all duration-300 ease-out hover:-translate-y-2 hover:-rotate-1 hover:border-[#c084fc] hover:shadow-[0_10px_20px_rgba(192,132,252,0.25)] cursor-pointer group">
          <img src="https://image.tmdb.org/t/p/w500/7WsyChvLEares19un3gNKg0wZg7.jpg" alt="Avengers: Age of Ultron" class="w-full h-full object-cover transition-all duration-300 group-hover:scale-105 group-hover:brightness-110">
        </div>
        <div class="overflow-hidden rounded-lg border border-[#243253] bg-[#0b0f19]/40 shadow-md aspect-[2/3] w-full transform transition-all duration-300 ease-out hover:-translate-y-2 hover:rotate-1 hover:border-[#c084fc] hover:shadow-[0_10px_20px_rgba(192,132,252,0.25)] cursor-pointer group">
          <img src="https://image.tmdb.org/t/p/w500/or066ehgSpB6zYQH67wF56Z6Zg5.jpg" alt="Avengers: Infinity War" class="w-full h-full object-cover transition-all duration-300 group-hover:scale-105 group-hover:brightness-110">
        </div>
        <div class="overflow-hidden rounded-lg border border-[#243253] bg-[#0b0f19]/40 shadow-md aspect-[2/3] w-full transform transition-all duration-300 ease-out hover:-translate-y-2 hover:-rotate-1 hover:border-[#c084fc] hover:shadow-[0_10px_20px_rgba(192,132,252,0.25)] cursor-pointer group">
          <img src="https://image.tmdb.org/t/p/w500/or066ehgSpB6zYQH67wF56Z6Zg5.jpg" alt="Avengers: Endgame" class="w-full h-full object-cover transition-all duration-300 group-hover:scale-105 group-hover:brightness-110">
        </div>
      </div>
    </section>
